<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Strang Household · Projects</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#F7F6F3;--surface:#FFF;--surface2:#F0EEE9;
  --border:#E2DDD6;--border-strong:#C8C2BA;
  --text:#1A1916;--text2:#4A4740;--text3:#8A8580;
  --accent:#185FA5;--accent-bg:#EBF2FB;
  --green:#0F6E56;--green-bg:#E8F5F1;
  --red:#A32D2D;--red-bg:#FBEAEA;
  --amber:#A36000;--amber-bg:#FBF3E4;
  --radius:8px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono','Fira Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.shell{max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px;}
header h1{font-size:20px;font-weight:600;letter-spacing:-.02em;}
header p{font-size:12px;color:var(--text3);margin-top:2px;}
.header-btns{display:flex;gap:8px;align-items:center;}
.hbtn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--radius);cursor:pointer;white-space:nowrap;}
button.hbtn.export{background:var(--accent);color:#fff;border:none;}
button.hbtn.export:hover{opacity:.88;}
button.hbtn.import{background:var(--surface);color:var(--text2);border:1px solid var(--border-strong);}
button.hbtn.import:hover{background:var(--surface2);}
a.hbtn.hub-link{background:var(--surface);color:var(--text2);border:1px solid var(--border-strong);text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-right:4px;transition:background .15s,border-color .15s,color .15s;}
a.hbtn.hub-link:hover{background:var(--accent-bg);border-color:#B8D4F0;color:var(--accent);}
#import-file{display:none;}
.save-indicator{font-size:11px;padding:4px 8px;background:var(--green-bg);color:var(--green);border-radius:20px;display:none;}
.save-indicator.show{display:inline-block;}
.save-indicator.offline{background:var(--red-bg);color:var(--red);}
button.hbtn.signout{background:var(--surface);color:var(--text3);border:1px solid var(--border);}
button.hbtn.signout:hover{background:var(--surface2);color:var(--text2);}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
#login-screen.hidden{display:none;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem 1.75rem;width:320px;box-shadow:0 4px 24px rgba(0,0,0,.06);}
.login-card h1{font-size:17px;font-weight:600;margin-bottom:1.25rem;letter-spacing:-.02em;}
.login-card .field{margin-bottom:.875rem;}
.login-card label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px;}
.login-card input{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg);color:var(--text);}
.login-card input:focus{outline:2px solid var(--accent);border-color:var(--accent);}
.login-card button{width:100%;padding:9px;font-size:13px;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;margin-top:.5rem;}
.login-card button:hover{opacity:.88;}
.login-card button:disabled{opacity:.5;cursor:default;}
.login-err{font-size:12px;color:var(--red);margin-top:.6rem;min-height:14px;}
.app-shell.hidden{display:none;}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;flex-wrap:wrap;}
.tab{font-size:13px;font-weight:500;padding:8px 18px;cursor:pointer;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;position:relative;bottom:-1px;display:flex;align-items:center;gap:7px;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.tab .cnt{font-size:11px;font-weight:600;font-family:var(--mono);background:var(--surface2);color:var(--text3);border-radius:20px;padding:1px 7px;min-width:20px;text-align:center;}
.tab.on .cnt{background:var(--accent-bg);color:var(--accent);}
.panel{display:none;}.panel.on{display:block;}
/* PANEL HEAD */
.p-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.15rem;flex-wrap:wrap;gap:10px;}
.p-head h2{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.1;}
.p-head .p-sub{font-size:12px;color:var(--text3);margin-top:3px;}
.p-head .p-total{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text2);}
.p-head .p-total .lbl{font-family:var(--font);font-weight:500;color:var(--text3);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-right:6px;}
/* ADD BUTTON */
button.add-proj{font-size:12px;font-weight:500;padding:8px 14px;border-radius:var(--radius);border:1px dashed var(--border-strong);background:var(--surface);color:var(--text2);cursor:pointer;margin-bottom:1rem;transition:background .15s,border-color .15s,color .15s;}
button.add-proj:hover{background:var(--accent-bg);border-color:#B8D4F0;color:var(--accent);}
/* CARDS */
.pcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem .95rem;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;transition:border-color .15s,box-shadow .15s;}
.pcard:hover{border-color:var(--border-strong);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.pcard-main{min-width:0;flex:1;}
.pcard-name{font-size:14px;font-weight:500;color:var(--text);letter-spacing:-.01em;word-break:break-word;}
.pcard-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.space-tag{font-size:10px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;text-transform:uppercase;letter-spacing:.04em;}
/* ZONE COLOURS — space tags coloured by zone */
.space-tag.z-blue  {color:#185FA5;background:#EBF2FB;border-color:#BFD9F2;}
.space-tag.z-green {color:#0F6E56;background:#E8F5F1;border-color:#A8DDD0;}
.space-tag.z-brown {color:#7A5230;background:#F6EFE7;border-color:#DFCBB4;}
.space-tag.z-orange{color:#A36000;background:#FBF3E4;border-color:#EFD9AC;}
.space-tag.z-pink  {color:#A32D6B;background:#FBEAF3;border-color:#EFC2DA;}
.space-tag.z-purple{color:#5B3EA8;background:#F1EDFB;border-color:#D3C7F0;}
.space-tag.z-none  {color:var(--text3);background:var(--surface2);border-color:var(--border);}
/* zone dot on the editor's space row */
.zone-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--border-strong);}
.zone-dot.z-blue{background:#185FA5;}.zone-dot.z-green{background:#0F6E56;}
.zone-dot.z-brown{background:#7A5230;}.zone-dot.z-orange{background:#A36000;}
.zone-dot.z-pink{background:#A32D6B;}.zone-dot.z-purple{background:#5B3EA8;}
/* zone legend under the tab bar */
.zone-legend{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:-.5rem 0 1.15rem;}
.zl-item{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.zl-sw{width:9px;height:9px;border-radius:3px;}
.amt{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--green);}
.amt.zero{color:var(--text3);font-weight:500;}
.pcard-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;}
button.pact{font-size:12px;line-height:1;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:5px;}
button.pact.edit:hover{color:var(--accent);background:var(--accent-bg);}
button.pact.del{font-size:15px;opacity:.4;}
button.pact.del:hover{color:var(--red);opacity:1;background:var(--red-bg);}
/* EDIT / ADD FORM CARD */
.pcard.editing{flex-direction:column;align-items:stretch;border-color:var(--accent);box-shadow:0 2px 10px rgba(24,95,165,.1);}
.edit-grid{display:grid;grid-template-columns:1fr;gap:9px;width:100%;}
.ef-row{display:flex;gap:9px;flex-wrap:wrap;}
.ef-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;}
.ef-field.grow{flex:2;}
.ef-field label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.ef-field input,.ef-field select{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg);color:var(--text);font-family:var(--font);}
.ef-field input.money{font-family:var(--mono);}
.ef-field input:focus,.ef-field select:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent);}
.ef-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px;}
button.ef-save{font-size:12px;font-weight:500;padding:7px 16px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer;}
button.ef-save:hover{opacity:.88;}
button.ef-cancel{font-size:12px;font-weight:500;padding:7px 14px;border-radius:6px;background:var(--surface);color:var(--text3);border:1px solid var(--border-strong);cursor:pointer;}
button.ef-cancel:hover{background:var(--surface2);color:var(--text2);}
/* DRAG */
.pcard{cursor:default;}
.pcard.draggable-card{}
.drag-grip{cursor:grab;color:var(--text3);font-size:14px;line-height:1;padding:2px 2px 0 0;user-select:none;opacity:.55;flex-shrink:0;align-self:flex-start;margin-top:1px;}
.drag-grip:hover{opacity:1;color:var(--text2);}
.pcard.dragging{opacity:.45;border-color:var(--accent);border-style:dashed;}
.pcard.drop-above{box-shadow:0 -2px 0 var(--accent);}
/* INLINE STAGE SELECT */
select.stage-sel{font-size:11px;font-weight:500;padding:3px 6px;border:1px solid var(--border-strong);border-radius:5px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--font);max-width:112px;}
select.stage-sel:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
select.stage-sel:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent);}
/* META CHIPS */
.chip{font-size:10px;font-weight:500;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px;white-space:nowrap;}
.chip.month{color:var(--accent);background:var(--accent-bg);border-color:#B8D4F0;}
.chip.done-dt{color:var(--green);background:var(--green-bg);border-color:#A8DDD0;}
.pcard-note{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.4;word-break:break-word;}
/* EDITOR TEXTAREA */
.ef-field textarea{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg);color:var(--text);font-family:var(--font);resize:vertical;min-height:38px;}
.ef-field textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent);}
/* EMPTY STATE */
.p-empty{background:var(--surface);border:1px dashed var(--border-strong);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center;color:var(--text3);}
.p-empty .ph-icon{font-size:28px;margin-bottom:.6rem;}
.p-empty h3{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:.35rem;letter-spacing:-.01em;}
.p-empty p{font-size:13px;max-width:380px;margin:0 auto;line-height:1.5;}
@media(max-width:560px){
  .shell{padding:1.25rem .875rem;}
  .pcards{grid-template-columns:1fr;}
  .tab{padding:8px 12px;}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login-screen" class="hidden">
  <div class="login-card">
    <h1>Strang Household · Projects</h1>
    <div class="field"><label>Email</label><input type="email" id="login-email" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()"></div>
    <div class="field"><label>Password</label><input type="password" id="login-pw" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"></div>
    <button id="login-btn" onclick="doSignIn()">Sign in</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div class="shell app-shell hidden" id="app-shell">
<header>
  <div>
    <h1>Strang Household · Projects</h1>
    <p id="last-saved-lbl">—</p>
  </div>
  <div class="header-btns">
    <a class="hbtn hub-link" href="/">← Hub</a>
    <span class="save-indicator" id="saved-badge">Saved ✓</span>
    <button class="hbtn import" onclick="document.getElementById('import-file').click()">Import</button>
    <input type="file" id="import-file" accept=".json" onchange="importData(event)">
    <button class="hbtn import" onclick="downloadHTML()" title="Save a copy of this tool with today's date">Download HTML</button>
    <button class="hbtn export" onclick="exportData()">Export &amp; Save</button>
    <button class="hbtn signout" onclick="doSignOut()">Sign out</button>
  </div>
</header>

<div class="tabs" id="tabs-bar"></div>

<!-- one panel per bucket, injected by JS -->
<div id="panels"></div>

</div><!-- /app-shell -->

<script>
// ═══════════════════════════════════════════════════════════════
//  Strang Household — Projects tool  ·  Stage 2 (moves + reorder + fields)
//  Sibling of the Budget & Net Worth tools. Shares Supabase auth.
//  Storage: its OWN table `projects_data`, one shared row keyed by
//  HOUSEHOLD_ID='strang', whole state as a JSON blob in `data`.
//  Never touches budget_data or networth_data.
// ═══════════════════════════════════════════════════════════════

// ── Supabase (same project as every tool) ──
var SUPABASE_URL='https://ldmoxearkzxhzjscprsh.supabase.co';
var SUPABASE_ANON_KEY='sb_publishable_SsudrYZqBzDtw23c2mT6Lw_GYM-gbYR';
var sbClient=(SUPABASE_URL.indexOf('YOUR_')===0)?null:supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
var HOUSEHOLD_ID='strang';
var LOCAL_BUFFER_KEY='strangProjects_offlineBuffer';
var APP_VERSION='Projects-Stage2';

// ── Buckets: the five stages a task can live in. Order = tab order. ──
var BUCKETS=['Soon','Later','Long Term','Big-Ticket','Done'];
var BUCKET_META={
  'Soon':      {icon:'📅', blurb:'Near-term — up next.'},
  'Later':     {icon:'🗂️', blurb:'On the radar, not yet scheduled.'},
  'Long Term': {icon:'🌱', blurb:'Someday / placeholder.'},
  'Big-Ticket':{icon:'💰', blurb:'Big future costs to save & prioritize.'},
  'Done':      {icon:'✅', blurb:'Completed.'}
};

// ── Spaces, grouped into colour-coded zones. Order here = order in the dropdown. ──
var ZONES=[
  {key:'blue',   label:'Basement',        spaces:['Basement','Basement Bathroom']},
  {key:'purple', label:'Interior',        spaces:['Kitchen','Living Room','Family Room','Master Bedroom',
                                                  'Bathroom','Hallway','Entrance','Regan\'s Room','Harrison\'s Room']},
  {key:'green',  label:'Yard & Exterior', spaces:['Front Yard','Back Yard','Side Yard','Driveway']},
  {key:'brown',  label:'Structures',      spaces:['Shed','Attic','Sunroom']},
  {key:'orange', label:'House-wide',      spaces:['House']},
  {key:'pink',   label:'Other',           spaces:['Other']}
];
// space -> zone key lookup (built once).
// Apostrophes are normalized so "Regan's Room" and "Regan’s Room" both resolve.
function normSpace(s){return String(s==null?'':s).replace(/[\u2018\u2019\u02BC]/g,'\'').trim();}
var SPACE_ZONE={};
ZONES.forEach(function(z){z.spaces.forEach(function(s){SPACE_ZONE[normSpace(s)]=z.key;});});
function zoneOf(space){return SPACE_ZONE[normSpace(space)]||'none';}
// Flat list of every zoned space, in zone order.
var DEFAULT_SPACES=ZONES.reduce(function(acc,z){return acc.concat(z.spaces);},[]);

// ── Global state (declared up-front with defaults) ──
var TASKS=[];              // [{id,name,space,amount,bucket,sortOrder,scheduledDate,targetMonth,notes,completedDate,actualCost}]
var SPACES=DEFAULT_SPACES.slice();
var _taskId=1;
var SAVE_HISTORY=[];
var activeBucket='Soon';
var editingId=null;        // task id being edited, or 'new:<bucket>' for a fresh add
var _cloudSaveTimer=null;

// ═══════════════ HELPERS ═══════════════
function pad2(n){return (n<10?'0':'')+n;}
function fmtMoney(v){
  var n=Number(v)||0;
  return '$'+n.toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c];});}
function findTask(id){return TASKS.find(function(t){return t.id===id;});}
function tasksIn(bucket){
  return TASKS.filter(function(t){return t.bucket===bucket;})
    .sort(function(a,b){return (a.sortOrder||0)-(b.sortOrder||0);});
}
function bucketTotal(bucket){
  return tasksIn(bucket).reduce(function(s,t){return s+(Number(t.amount)||0);},0);
}
function nextSortOrder(bucket){
  var list=tasksIn(bucket);
  return list.length?(list[list.length-1].sortOrder||0)+10:10;
}

// ═══════════════ RENDER: TABS ═══════════════
function renderTabs(){
  var bar=document.getElementById('tabs-bar');
  bar.innerHTML=BUCKETS.map(function(b){
    var n=tasksIn(b).length;
    return '<button class="tab'+(b===activeBucket?' on':'')+'" id="tab-'+tabKey(b)+'" onclick="showTab(\''+b+'\')">'+
      esc(b)+'<span class="cnt">'+n+'</span></button>';
  }).join('');
}
function tabKey(b){return b.toLowerCase().replace(/[^a-z]+/g,'-');}
function showTab(b){
  activeBucket=b;editingId=null;renderTabs();renderPanels();
}

// ═══════════════ RENDER: PANELS ═══════════════
function renderPanels(){
  var host=document.getElementById('panels');
  var b=activeBucket,meta=BUCKET_META[b];
  var list=tasksIn(b),total=bucketTotal(b);
  var html='<div class="panel on">';
  // head
  html+='<div class="p-head"><div>'+
    '<h2>'+esc(b)+'</h2>'+
    '<div class="p-sub">'+esc(meta.blurb)+'</div></div>'+
    '<div class="p-total"><span class="lbl">Total</span>'+fmtMoney(total)+'</div></div>';
  html+=zoneLegend();
  // add button (unless already adding here)
  if(editingId!=='new:'+b){
    html+='<button class="add-proj" onclick="startAdd(\''+b+'\')">+ Add project</button>';
  }
  // cards
  html+='<div class="pcards">';
  if(editingId==='new:'+b){html+=editorCard(null,b);}
  if(!list.length && editingId!=='new:'+b){
    html+='</div>'+emptyState(b);
  }else{
    list.forEach(function(t){
      html+=(editingId===t.id)?editorCard(t,b):taskCard(t);
    });
    html+='</div>';
  }
  html+='</div>';
  host.innerHTML=html;
  if(document.getElementById('ef-bucket'))syncEditorFields();
  var focusEl=document.getElementById('ef-name');
  if(focusEl)focusEl.focus();
}
// Colour key for the zones, shown under the tab bar.
var ZONE_SWATCH={blue:'#185FA5',purple:'#5B3EA8',green:'#0F6E56',brown:'#7A5230',orange:'#A36000',pink:'#A32D6B'};
function zoneLegend(){
  return '<div class="zone-legend">'+ZONES.map(function(z){
    return '<span class="zl-item"><span class="zl-sw" style="background:'+ZONE_SWATCH[z.key]+'"></span>'+esc(z.label)+'</span>';
  }).join('')+'</div>';
}
function emptyState(b){
  return '<div class="p-empty"><div class="ph-icon">'+BUCKET_META[b].icon+'</div>'+
    '<h3>Nothing in '+esc(b)+' yet</h3>'+
    '<p>Add a project and it\u2019ll live here. You can move it to another stage anytime by editing it.</p></div>';
}
function taskCard(t){
  // money shown: for Done, prefer the actual cost if entered; else the estimate
  var shownAmt=(t.bucket==='Done'&&t.actualCost!=null)?Number(t.actualCost):Number(t.amount);
  var hasAmt=(t.bucket==='Done'&&t.actualCost!=null)?true:(Number(t.amount)>0);
  var amtHtml=hasAmt?'<span class="amt">'+fmtMoney(shownAmt)+'</span>':'<span class="amt zero">\u2014</span>';
  var spaceHtml=t.space?'<span class="space-tag z-'+zoneOf(t.space)+'">'+esc(t.space)+'</span>':'';
  // stage-specific chips
  var chips='';
  if(t.bucket==='Later'&&t.targetMonth)chips+='<span class="chip month">'+esc(fmtMonthLabel(t.targetMonth))+'</span>';
  if(t.bucket==='Done'&&t.completedDate)chips+='<span class="chip done-dt">'+esc(fmtDateLabel(t.completedDate))+'</span>';
  var noteHtml=(t.bucket==='Later'&&t.notes)?'<div class="pcard-note">'+esc(t.notes)+'</div>':'';
  var stageSel='<select class="stage-sel" title="Move to another stage" onchange="changeStage('+t.id+',this.value)">'+
    BUCKETS.map(function(b){return '<option value="'+esc(b)+'"'+(b===t.bucket?' selected':'')+'>'+esc(b)+'</option>';}).join('')+
    '</select>';
  return '<div class="pcard draggable-card" data-id="'+t.id+'" draggable="true" '+
      'ondragstart="taskDragStart(event,'+t.id+',\''+esc(t.bucket)+'\')" '+
      'ondragover="taskDragOver(event,'+t.id+')" '+
      'ondragleave="taskDragLeave(event,'+t.id+')" '+
      'ondrop="taskDrop(event,'+t.id+')" ondragend="taskDragEnd(event)">'+
    '<span class="drag-grip" title="Drag to reorder">\u283f</span>'+
    '<div class="pcard-main">'+
      '<div class="pcard-name">'+esc(t.name)+'</div>'+
      '<div class="pcard-meta">'+spaceHtml+amtHtml+chips+'</div>'+
      noteHtml+
    '</div>'+
    '<div class="pcard-actions">'+
      stageSel+
      '<button class="pact edit" title="Edit" onclick="startEdit('+t.id+')">\u270e</button>'+
      '<button class="pact del" title="Delete" onclick="delTask('+t.id+')">\u00d7</button>'+
    '</div>'+
  '</div>';
}
function editorCard(t,bucket){
  var isNew=!t;
  var name=t?t.name:'';
  var space=t?t.space:'';
  var amount=(t&&t.amount!=null)?t.amount:'';
  var bk=t?t.bucket:bucket;
  var targetMonth=(t&&t.targetMonth)?t.targetMonth:'';
  var notes=(t&&t.notes)?t.notes:'';
  var completedDate=(t&&t.completedDate)?t.completedDate:'';
  var actualCost=(t&&t.actualCost!=null)?t.actualCost:'';
  // Space dropdown, grouped by zone (optgroups render natively on every browser).
  // Any space in the data that isn't in a zone (e.g. legacy "Yard") is kept under "Unsorted".
  var zoned={};
  var nSpace=normSpace(space);
  var spaceOpts='<option value="">— space —</option>';
  ZONES.forEach(function(z){
    var opts=z.spaces.filter(function(s){return SPACES.indexOf(s)>=0||DEFAULT_SPACES.indexOf(s)>=0;});
    if(!opts.length)return;
    spaceOpts+='<optgroup label="'+esc(z.label)+'">'+opts.map(function(s){
      zoned[normSpace(s)]=1;
      return '<option value="'+esc(s)+'"'+(normSpace(s)===nSpace?' selected':'')+'>'+esc(s)+'</option>';}).join('')+'</optgroup>';
  });
  var leftovers=SPACES.filter(function(s){return !zoned[normSpace(s)];});
  if(leftovers.length){
    spaceOpts+='<optgroup label="Unsorted">'+leftovers.map(function(s){
      return '<option value="'+esc(s)+'"'+(normSpace(s)===nSpace?' selected':'')+'>'+esc(s)+'</option>';}).join('')+'</optgroup>';
  }
  var bucketOpts=BUCKETS.map(function(b){
    return '<option value="'+esc(b)+'"'+(b===bk?' selected':'')+'>'+esc(b)+'</option>';}).join('');
  var saveArg=isNew?'null':t.id;
  var amtLabel=(bk==='Big-Ticket')?'Est. cost ($)':'Amount ($)';
  return '<div class="pcard editing"><div class="edit-grid">'+
    '<div class="ef-field grow"><label>Project</label>'+
      '<input id="ef-name" type="text" value="'+esc(name)+'" placeholder="e.g. Paint basement stairwell" '+
      'onkeydown="if(event.key===\'Enter\')saveEditor('+saveArg+');if(event.key===\'Escape\')cancelEditor()"></div>'+
    '<div class="ef-row">'+
      '<div class="ef-field grow"><label>Space</label><select id="ef-space">'+spaceOpts+'</select></div>'+
      '<div class="ef-field"><label id="ef-amount-lbl">'+amtLabel+'</label>'+
        '<input id="ef-amount" class="money" type="number" step="1" value="'+esc(amount)+'" placeholder="0"></div>'+
    '</div>'+
    '<div class="ef-field"><label>Stage</label><select id="ef-bucket" onchange="syncEditorFields()">'+bucketOpts+'</select></div>'+
    // Later-only group
    '<div id="ef-later-wrap" class="ef-row" style="display:none;">'+
      '<div class="ef-field"><label>Target month <span style="font-weight:400;text-transform:none;color:var(--text3);">optional</span></label>'+
        '<input id="ef-target" type="month" value="'+esc(targetMonth)+'"></div>'+
      '<div class="ef-field grow"><label>Notes <span style="font-weight:400;text-transform:none;color:var(--text3);">optional</span></label>'+
        '<textarea id="ef-notes" rows="2" placeholder="planning notes…">'+esc(notes)+'</textarea></div>'+
    '</div>'+
    // Done-only group
    '<div id="ef-done-wrap" class="ef-row" style="display:none;">'+
      '<div class="ef-field"><label>Completed date <span style="font-weight:400;text-transform:none;color:var(--text3);">optional</span></label>'+
        '<input id="ef-completed" type="date" value="'+esc(completedDate)+'"></div>'+
      '<div class="ef-field"><label>Actual cost ($) <span style="font-weight:400;text-transform:none;color:var(--text3);">optional</span></label>'+
        '<input id="ef-actual" class="money" type="number" step="1" value="'+esc(actualCost)+'" placeholder="0"></div>'+
    '</div>'+
    '<div class="ef-actions">'+
      '<button class="ef-cancel" onclick="cancelEditor()">Cancel</button>'+
      '<button class="ef-save" onclick="saveEditor('+saveArg+')">'+(isNew?'Add project':'Save')+'</button>'+
    '</div>'+
  '</div></div>';
}
// Show only the field group that matches the currently-selected stage.
function syncEditorFields(){
  var sel=document.getElementById('ef-bucket');if(!sel)return;
  var bk=sel.value;
  var lw=document.getElementById('ef-later-wrap');
  var dw=document.getElementById('ef-done-wrap');
  if(lw)lw.style.display=(bk==='Later')?'flex':'none';
  if(dw)dw.style.display=(bk==='Done')?'flex':'none';
  var lbl=document.getElementById('ef-amount-lbl');
  if(lbl)lbl.textContent=(bk==='Big-Ticket')?'Est. cost ($)':'Amount ($)';
}

// ═══════════════ CRUD ═══════════════
function startAdd(bucket){editingId='new:'+bucket;renderPanels();}
function startEdit(id){editingId=id;renderPanels();}
function cancelEditor(){editingId=null;renderPanels();}
function getVal(id){var e=document.getElementById(id);return e?e.value:'';}
function numOrNull(id){var v=getVal(id);return v===''?null:(Number(v)||0);}
function strOrNull(id){var v=(getVal(id)||'').trim();return v||null;}
function saveEditor(id){
  var name=(document.getElementById('ef-name').value||'').trim();
  if(!name){document.getElementById('ef-name').focus();return;}
  var space=getVal('ef-space');
  var amount=numOrNull('ef-amount');
  var bucket=getVal('ef-bucket');
  // stage-specific (stored regardless; only shown where relevant)
  var targetMonth=strOrNull('ef-target');
  var notes=strOrNull('ef-notes');
  var completedDate=strOrNull('ef-completed');
  var actualCost=numOrNull('ef-actual');
  if(id==null){
    TASKS.push({id:_taskId++,name:name,space:space,amount:amount,bucket:bucket,
      sortOrder:nextSortOrder(bucket),scheduledDate:null,
      targetMonth:targetMonth,notes:notes,completedDate:completedDate,actualCost:actualCost});
    activeBucket=bucket; // jump to where it landed
  }else{
    var t=findTask(id);if(!t)return;
    var moved=(t.bucket!==bucket);
    t.name=name;t.space=space;t.amount=amount;
    t.targetMonth=targetMonth;t.notes=notes;t.completedDate=completedDate;t.actualCost=actualCost;
    if(moved){t.bucket=bucket;t.sortOrder=nextSortOrder(bucket);activeBucket=bucket;}
  }
  editingId=null;
  renderTabs();renderPanels();scheduleCloudSave();
}
// ── Quick stage change from the inline dropdown on a card ──
function changeStage(id,newBucket){
  var t=findTask(id);if(!t||t.bucket===newBucket)return;
  t.bucket=newBucket;t.sortOrder=nextSortOrder(newBucket);
  editingId=null;
  renderTabs();renderPanels();scheduleCloudSave();
  showSavedBadge('Moved to '+newBucket+' \u2713');
}
// ── Drag-to-reorder within a stage (persisted via sortOrder) ──
var _dragId=null,_dragBucket=null;
function taskDragStart(e,id,bucket){
  _dragId=id;_dragBucket=bucket;
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain',String(id));}catch(_){}
  var card=e.target.closest?e.target.closest('.pcard'):null;
  if(card)card.classList.add('dragging');
}
function taskDragOver(e,overId){
  if(_dragId===null)return;
  var over=findTask(overId);
  if(!over||over.bucket!==_dragBucket||over.id===_dragId)return; // only within same stage
  e.preventDefault();e.dataTransfer.dropEffect='move';
  var card=e.target.closest?e.target.closest('.pcard'):null;
  if(card)card.classList.add('drop-above');
}
function taskDragLeave(e,overId){
  var card=e.target.closest?e.target.closest('.pcard'):null;
  if(card)card.classList.remove('drop-above');
}
function taskDrop(e,targetId){
  if(_dragId===null)return;
  var dragged=findTask(_dragId),target=findTask(targetId);
  if(!dragged||!target||dragged.bucket!==target.bucket||dragged.id===target.id){taskDragEnd(e);return;}
  e.preventDefault();
  var ordered=tasksIn(dragged.bucket);              // sorted by sortOrder
  var di=ordered.findIndex(function(t){return t.id===dragged.id;});
  var tiOrig=ordered.findIndex(function(t){return t.id===target.id;});
  ordered.splice(di,1);
  var tiNew=ordered.findIndex(function(t){return t.id===target.id;});
  var insertAt=(di<tiOrig)?tiNew+1:tiNew;           // downward → after; upward → before
  ordered.splice(insertAt,0,dragged);
  ordered.forEach(function(t,i){t.sortOrder=(i+1)*10;});
  _dragId=null;_dragBucket=null;
  renderPanels();scheduleCloudSave();
}
function taskDragEnd(e){
  _dragId=null;_dragBucket=null;
  document.querySelectorAll('.pcard.dragging').forEach(function(c){c.classList.remove('dragging');});
  document.querySelectorAll('.pcard.drop-above').forEach(function(c){c.classList.remove('drop-above');});
}
// ── Label formatters for stage-specific chips ──
function fmtMonthLabel(ym){
  if(!ym)return'';var p=String(ym).split('-');if(p.length<2)return ym;
  var d=new Date(+p[0],+p[1]-1,1);
  return d.toLocaleDateString('en-CA',{month:'short',year:'numeric'});
}
function fmtDateLabel(ds){
  if(!ds)return'';var p=String(ds).split('-');if(p.length<3)return ds;
  var d=new Date(+p[0],+p[1]-1,+p[2]);
  return d.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
}
function delTask(id){
  var t=findTask(id);if(!t)return;
  if(!confirm('Delete \u201c'+t.name+'\u201d?\n\nThis removes it permanently.'))return;
  TASKS=TASKS.filter(function(x){return x.id!==id;});
  editingId=null;renderTabs();renderPanels();scheduleCloudSave();
}

// ═══════════════ PERSISTENCE ═══════════════
function buildSavePayload(){
  var now=new Date().toISOString();
  SAVE_HISTORY.unshift(now);
  if(SAVE_HISTORY.length>10)SAVE_HISTORY.length=10;
  return{version:1,savedAt:now,appVersion:APP_VERSION,saveHistory:SAVE_HISTORY,
    tasks:TASKS,taskNextId:_taskId,spaces:SPACES};
}
function normalizeTasks(list){
  return (list||[]).map(function(t){
    return {id:t.id,name:t.name||'',space:t.space||'',
      amount:(t.amount==null?null:Number(t.amount)),
      bucket:BUCKETS.indexOf(t.bucket)>=0?t.bucket:'Later',
      sortOrder:t.sortOrder||0,
      scheduledDate:t.scheduledDate||null,targetMonth:t.targetMonth||null,
      notes:t.notes||null,completedDate:t.completedDate||null,
      actualCost:(t.actualCost==null?null:Number(t.actualCost))};
  });
}
function applyLoadedData(data,sourceLbl){
  if(!data)return;
  if(Array.isArray(data.tasks))TASKS=normalizeTasks(data.tasks);
  // Merge saved spaces with the zone list. Zoned spaces always appear; an unzoned
  // legacy space (e.g. "Yard") is kept ONLY while some task still uses it, so it
  // drops out of the dropdown on its own once retagged. Apostrophe-insensitive.
  var merged=DEFAULT_SPACES.slice();
  var seen={};merged.forEach(function(s){seen[normSpace(s)]=1;});
  var inUse={};TASKS.forEach(function(t){if(t.space)inUse[normSpace(t.space)]=1;});
  if(Array.isArray(data.spaces)){
    data.spaces.forEach(function(s){
      var n=normSpace(s);
      if(s&&!seen[n]&&inUse[n]){merged.push(s);seen[n]=1;}
    });
  }
  // Also surface any space a task uses that isn't in the saved list at all.
  TASKS.forEach(function(t){
    var n=normSpace(t.space);
    if(t.space&&!seen[n]){merged.push(t.space);seen[n]=1;}
  });
  SPACES=merged;
  _taskId=data.taskNextId||(TASKS.length?Math.max.apply(null,TASKS.map(function(t){return t.id||0;}))+1:1);
  SAVE_HISTORY=data.saveHistory||[];
  var d=new Date(data.savedAt||Date.now());
  document.getElementById('last-saved-lbl').textContent=
    (sourceLbl||'Loaded')+' · Saved '+d.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
  if(BUCKETS.indexOf(activeBucket)<0)activeBucket='Soon';
  renderTabs();renderPanels();
}
function scheduleCloudSave(){
  if(_cloudSaveTimer)clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer=setTimeout(saveToCloud,600);
}
async function saveToCloud(){
  var payload=buildSavePayload();
  if(!sbClient){showSavedBadge('Cloud not configured',true);return;}
  try{
    if(!navigator.onLine)throw new Error('offline');
    var res=await sbClient.from('projects_data').upsert(
      {household_id:HOUSEHOLD_ID,data:payload,updated_at:new Date().toISOString()},
      {onConflict:'household_id'});
    if(res.error)throw res.error;
    localStorage.removeItem(LOCAL_BUFFER_KEY);showSavedBadge('Saved \u2713');
  }catch(err){
    localStorage.setItem(LOCAL_BUFFER_KEY,JSON.stringify(payload));showSavedBadge('Saved offline \u26a0',true);
  }
}
function syncOfflineBuffer(){
  var buf=localStorage.getItem(LOCAL_BUFFER_KEY);
  if(buf&&sbClient)saveToCloud();
}
window.addEventListener('online',syncOfflineBuffer);
async function loadFromCloud(){
  if(!sbClient)return;
  try{
    var res=await sbClient.from('projects_data').select('data,updated_at').eq('household_id',HOUSEHOLD_ID).maybeSingle();
    if(res.error)throw res.error;
    if(res.data&&res.data.data){
      applyLoadedData(res.data.data,'Loaded from cloud');
    }else{
      // Empty table → start clean and lay down the first row.
      TASKS=[];activeBucket='Soon';renderTabs();renderPanels();
      document.getElementById('last-saved-lbl').textContent='New — add your first project to get started.';
      saveToCloud();
    }
  }catch(err){
    var buf=localStorage.getItem(LOCAL_BUFFER_KEY);
    if(buf){applyLoadedData(JSON.parse(buf),'Loaded from offline buffer (unsynced)');}
    else{document.getElementById('last-saved-lbl').textContent='Could not reach cloud — check your connection';}
  }
}
function showSavedBadge(msg,isErr){
  var b=document.getElementById('saved-badge');
  b.textContent=msg;b.classList.toggle('offline',!!isErr);b.classList.add('show');
  clearTimeout(showSavedBadge._t);
  showSavedBadge._t=setTimeout(function(){b.classList.remove('show');},2200);
}

// ── Export / Import / Download ──
function exportData(){
  var payload=buildSavePayload();
  var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');var d=new Date();
  a.href=url;a.download='Strang_Projects_-_'+d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+'.json';
  a.click();URL.revokeObjectURL(url);saveToCloud();showSavedBadge('Exported \u2713');
}
function importData(ev){
  var file=ev.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(){try{applyLoadedData(JSON.parse(r.result),'Imported');scheduleCloudSave();}
    catch(e){alert('Could not read that file — is it a Projects export?');}};
  r.readAsText(file);ev.target.value='';
}
function downloadHTML(){
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var blob=new Blob([html],{type:'text/html'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');var d=new Date();
  a.href=url;a.download='Strang_Projects_-_'+d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())+'.html';
  a.click();URL.revokeObjectURL(url);showSavedBadge('Downloaded \u2713');
}

// ═══════════════ AUTH ═══════════════
function showLoginScreen(){
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-shell').classList.add('hidden');
}
function showAppScreen(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
}
async function doSignIn(){
  var email=document.getElementById('login-email').value.trim();
  var pw=document.getElementById('login-pw').value;
  var errEl=document.getElementById('login-err');var btn=document.getElementById('login-btn');
  errEl.textContent='';
  if(!email||!pw){errEl.textContent='Enter your email and password.';return;}
  if(!sbClient){errEl.textContent='Cloud backend not configured yet.';return;}
  btn.disabled=true;btn.textContent='Signing in…';
  var res=await sbClient.auth.signInWithPassword({email:email,password:pw});
  btn.disabled=false;btn.textContent='Sign in';
  if(res.error){errEl.textContent=res.error.message;return;}
  document.getElementById('login-pw').value='';
  await initAppAfterAuth();
}
async function doSignOut(){if(sbClient)await sbClient.auth.signOut();showLoginScreen();}
async function initAppAfterAuth(){
  showAppScreen();activeBucket='Soon';renderTabs();renderPanels();
  await loadFromCloud();syncOfflineBuffer();
}
async function initAuth(){
  if(!sbClient){showLoginScreen();document.getElementById('login-err').textContent='Cloud backend not configured — edit SUPABASE_URL/SUPABASE_ANON_KEY in the script.';return;}
  var res=await sbClient.auth.getSession();
  if(res.data&&res.data.session){await initAppAfterAuth();}else{showLoginScreen();}
  sbClient.auth.onAuthStateChange(function(event){if(event==='SIGNED_OUT')showLoginScreen();});
}
window.addEventListener('load',function(){initAuth();});
</script>
